name: Android Build
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17' # Java 17 é ideal para o Target SDK 33

      - name: Setup Haxe
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: 4.3.6

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r21e

      - name: Install Libraries
        run: |
          haxelib setup ~/haxelib
          haxelib install lime
          haxelib install openfl
          haxelib install flixel
          haxelib run lime setup
          # Instala bibliotecas necessárias para o motor
          haxelib install flixel-addons
          haxelib install flixel-ui
          haxelib install flxanimate
          haxelib install hscript-iris
          haxelib git hxvlc https://github.com/MAJigsaw77/hxvlc
          haxelib git extension-androidtools https://github.com/MAJigsaw77/extension-androidtools

      - name: Configure Lime
        run: |
          haxelib run lime config ANDROID_SDK $ANDROID_SDK_ROOT
          haxelib run lime config ANDROID_NDK ${{ steps.setup-ndk.outputs.ndk-path }}
          haxelib run lime config JAVA_HOME $JAVA_HOME
          haxelib run lime config ANDROID_SETUP true

      - name: Build APK
        run: |
          # O uso do -debug costuma ser mais bem-sucedido em ports iniciais
          # Adicionado -clean para garantir que o Gradle não use lixo de cache
          haxelib run lime build android -debug -clean -DHXCPP_COMPILE_THREADS=4

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NightmareVision-Android
          path: export/debug/android/bin/app/build/outputs/apk/debug/*.apk